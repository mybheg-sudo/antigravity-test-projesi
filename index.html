<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay Zeka Devrimi | Hoş Geldiniz</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: rgba(31, 40, 51, 0.7);
            --primary-accent: #66fcf1;
            --secondary-accent: #45a29e;
            --text-light: #c5c6c7;
            --text-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(102, 252, 241, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 252, 241, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* Glowing Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(102, 252, 241, 0.15);
            top: -100px;
            left: -100px;
        }
        
        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(69, 162, 158, 0.2);
            bottom: -50px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            background: var(--container-bg);
            padding: 3rem 4rem;
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 40px rgba(102, 252, 241, 0.1);
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(102, 252, 241, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid rgba(102, 252, 241, 0.3);
            margin-bottom: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: fadeIn 1s 0.5s ease backwards;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-accent);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Typography */
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1rem;
            color: var(--text-white);
            letter-spacing: -1px;
            animation: fadeInDown 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        h1 span {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 2.5rem;
            animation: fadeIn 1s 0.6s ease backwards;
        }

        /* Decorative Line */
        .divider {
            height: 1px;
            width: 0;
            background: linear-gradient(90deg, transparent, rgba(102, 252, 241, 0.5), transparent);
            margin: 0 auto 2rem;
            animation: expandWidth 1s 0.8s ease forwards;
        }

        @keyframes expandWidth {
            to { width: 100%; }
        }

        /* Interactive Element */
        .interactive-btn {
            display: inline-block;
            background: transparent;
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 32px;
            border: 1px solid var(--primary-accent);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 1;
            animation: fadeIn 1s 1s ease backwards;
        }

        .interactive-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(102, 252, 241, 0.1);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
            z-index: -1;
        }

        .interactive-btn:hover {
            color: var(--bg-color);
            background: var(--primary-accent);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
            transform: translateY(-2px);
        }

        .interactive-btn:active {
            transform: translateY(1px);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 2rem; }
            .status-badge { font-size: 0.75rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <div class="container">
        <div class="status-badge">
            <span class="status-dot"></span>
            Bağlantı Başarılı
        </div>
        
        <h1>Yapay Zeka <br><span>Devrimine</span><br> Hoş Geldiniz</h1>
        
        <div class="divider"></div>
        
        <p>Sistem çevrimiçi. Veri akışı mükemmel. Gelecek, parmaklarınızın ucunda şekilleniyor. Başlamak için sistemle etkileşime geçin.</p>
        
        <a href="#" class="interactive-btn" onclick="triggerEffect(this); return false;">Sistemi Başlat</a>
    </div>

    <script>
        function triggerEffect(btn) {
            btn.innerText = "Sistem Başlatılıyor...";
            btn.style.pointerEvents = "none";
            
            // Add matrix-like background effect
            const body = document.querySelector('body');
            const newOrb = document.createElement('div');
            newOrb.classList.add('orb');
            newOrb.style.width = '100vw';
            newOrb.style.height = '100vh';
            newOrb.style.background = 'rgba(102, 252, 241, 0.05)';
            newOrb.style.top = '0';
            newOrb.style.left = '0';
            newOrb.style.animation = 'none';
            newOrb.style.transition = 'opacity 2s ease';
            newOrb.style.opacity = '0';
            newOrb.style.zIndex = '1';
            body.appendChild(newOrb);
            
            setTimeout(() => {
                newOrb.style.opacity = '1';
                btn.innerText = "Sistem Aktif";
                btn.style.background = "var(--primary-accent)";
                btn.style.color = "var(--bg-color)";
            }, 500);
        }
    </script>
</body>
</html>
